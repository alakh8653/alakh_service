name: mobile_app
description: >
  AlakhService mobile application — connects customers with local service
  providers for bookings, real-time tracking, payments, and more.
version: 1.0.0+1

publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.4
  bloc: ^8.1.3
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.1

  # Networking
  dio: ^5.4.1
  web_socket_channel: ^2.4.3
  connectivity_plus: ^6.0.3

  # Dependency injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Functional programming
  dartz: ^0.10.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  firebase_analytics: ^10.8.9
  firebase_crashlytics: ^3.4.18

  # UI utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_maps_flutter: ^2.5.3

  # Permissions & hardware
  permission_handler: ^11.3.0
  local_auth: ^2.1.8
  geolocator: ^11.0.0
  image_picker: ^1.0.7

  # Sharing & deep linking
  share_plus: ^7.2.2
  url_launcher: ^6.2.6

  # Serialization & utilities
  json_annotation: ^4.8.1
  intl: ^0.19.0
  collection: ^1.18.0
  rxdart: ^0.27.7
  uuid: ^4.3.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

  # Testing
  bloc_test: ^9.1.6
  mockito: ^5.4.4
  golden_toolkit: ^0.15.0
  network_image_mock: ^2.1.1

  # Linting
  flutter_lints: ^3.0.1
  very_good_analysis: ^5.1.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # Fonts placeholder — add actual font files under assets/fonts/
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
