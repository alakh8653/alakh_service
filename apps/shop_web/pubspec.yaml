name: shop_web
description: Shop Dashboard Web Application for managing shop business.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.3
  go_router: ^12.1.1
  dio: ^5.4.0
  get_it: ^7.6.4
  injectable: ^2.3.2
  dartz: ^0.10.1
  equatable: ^2.0.5
  fl_chart: ^0.65.0
  data_table_2: ^2.5.9
  intl: ^0.18.1
  json_annotation: ^4.8.1
  web_socket_channel: ^2.4.0
  file_picker: ^6.1.1
  url_strategy: ^2.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  image_picker_web: ^4.0.0
  csv: ^6.0.0
  pdf: ^3.10.7
  printing: ^5.12.0
  logger: ^2.1.0
  rxdart: ^0.27.7
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mockito: ^5.4.4
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
