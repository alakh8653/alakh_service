name: admin_web
description: Admin Control Panel Web Application for Alakh Service Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.3
  go_router: ^12.1.1
  dio: ^5.3.4
  get_it: ^7.6.4
  dartz: ^0.10.1
  equatable: ^2.0.5
  fl_chart: ^0.65.0
  data_table_2: ^2.5.12
  intl: ^0.18.1
  web_socket_channel: ^2.4.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  timeago: ^3.6.0
  uuid: ^4.2.2
  crypto: ^3.0.3
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5
  mockito: ^5.4.3
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
