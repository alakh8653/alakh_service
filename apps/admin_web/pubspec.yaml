name: admin_web
description: AlakhService admin web panel.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  firebase_core: ^2.24.2
  api_client:
    path: ../../packages/api_client
  auth_module:
