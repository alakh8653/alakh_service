name: admin_web
description: AlakhService Admin Panel — platform administration, analytics, and compliance.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Shared packages
  api_client:
    path: ../../packages/api_client
  auth_module:
    path: ../../packages/auth_module
  shared_models:
    path: ../../packages/shared_models
  shared_utils:
    path: ../../packages/shared_utils
  ui_kit:
    path: ../../packages/ui_kit
  analytics_module:
    path: ../../packages/analytics_module
  # Navigation
  go_router: ^13.2.0
  # State
  flutter_bloc: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
