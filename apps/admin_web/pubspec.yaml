  analytics_module:
    path: ../../packages/analytics_module
  shared_models:
    path: ../../packages/shared_models
  shared_utils:
    path: ../../packages/shared_utils
  ui_kit:
    path: ../../packages/ui_kit

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
