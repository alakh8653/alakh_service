<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Alakh Admin Control Panel">
  <meta name="theme-color" content="#1f6feb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Alakh Admin">
  <title>Alakh Admin Panel</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    #loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }

    .loading-logo {
      font-size: 28px;
      font-weight: 700;
      color: #1f6feb;
      letter-spacing: 1px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #1f6feb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      font-size: 14px;
      color: #8b949e;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    flt-glass-pane {
      background-color: #0d1117 !important;
    }
  </style>
</head>
<body>
  <div id="loading-container">
    <div class="loading-logo">⚡ Alakh Admin</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading admin panel...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loadingContainer = document.getElementById('loading-container');
      if (loadingContainer) {
        loadingContainer.style.display = 'none';
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
