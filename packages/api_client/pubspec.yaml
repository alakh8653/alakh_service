name: api_client
description: HTTP client package for AlakhService using Dio with interceptors, retry logic, and typed exceptions.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.0.0
  shared_models:
    path: ../shared_models

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
