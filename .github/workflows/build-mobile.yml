name: Build Mobile

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      flavor:
        description: "Build flavor"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production
      platform:
        description: "Platform to build"
        required: true
        default: "both"
        type: choice
        options:
          - android
          - ios
          - both

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.22.2"
  PUB_CACHE: ${{ github.workspace }}/.pub-cache

jobs:
  # ============================================================
  # Android Build
  # ============================================================
  build-android:
    name: Build Android (${{ github.event.inputs.flavor || 'production' }})
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.platform == 'android' ||
      github.event.inputs.platform == 'both'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run code generation
        run: melos run build:runner

      - name: Decode keystore
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: apps/mobile_app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Configure signing
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: apps/mobile_app/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat >> key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      - name: Build APK (dev)
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.flavor == 'dev'
        working-directory: apps/mobile_app
        run: flutter build apk --flavor dev --dart-define=FLAVOR=dev --debug

      - name: Build APK (staging)
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.flavor == 'staging'
        working-directory: apps/mobile_app
        run: flutter build apk --flavor staging --dart-define=FLAVOR=staging --profile

      - name: Build APK + AAB (production / tag push)
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.flavor == 'production')
        working-directory: apps/mobile_app
        run: |
          flutter build apk --flavor production --dart-define=FLAVOR=production --release
          flutter build appbundle --flavor production --dart-define=FLAVOR=production --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.event.inputs.flavor || 'production' }}
          path: apps/mobile_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: >
          github.event_name == 'push' ||
          github.event.inputs.flavor == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-production
          path: apps/mobile_app/build/app/outputs/bundle/productionRelease/*.aab
          retention-days: 30

  # ============================================================
  # iOS Build
  # ============================================================
  build-ios:
    name: Build iOS (${{ github.event.inputs.flavor || 'production' }})
    runs-on: macos-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.platform == 'ios' ||
      github.event.inputs.platform == 'both'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run code generation
        run: melos run build:runner

      - name: Install CocoaPods
        working-directory: apps/mobile_app/ios
        run: pod install --repo-update

      - name: Build iOS (dev, no codesign)
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.flavor == 'dev'
        working-directory: apps/mobile_app
        run: flutter build ios --flavor dev --dart-define=FLAVOR=dev --no-codesign --debug

      - name: Build iOS (production, no codesign)
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.flavor == 'production')
        working-directory: apps/mobile_app
        run: flutter build ios --flavor production --dart-define=FLAVOR=production --no-codesign --release

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.event.inputs.flavor || 'production' }}
          path: apps/mobile_app/build/ios/iphoneos/Runner.app
          retention-days: 30

  # ============================================================
  # Create GitHub Release (on tag push)
  # ============================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-production
          path: release-artifacts/android

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab-production
          path: release-artifacts/android

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AlakhService ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/android/*.apk
            release-artifacts/android/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
