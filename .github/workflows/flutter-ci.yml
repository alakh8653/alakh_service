name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'melos.yaml'
      - 'analysis_options.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'melos.yaml'
      - 'analysis_options.yaml'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: stable
          cache: true

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap packages
        run: melos bootstrap

      - name: Flutter analyze
        run: melos run analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: stable
          cache: true

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap packages
        run: melos bootstrap

      - name: Run tests
        run: melos run test

  build-mobile:
    name: Build Mobile App
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: stable
          cache: true

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap packages
        run: melos bootstrap

      - name: Build APK (debug)
        working-directory: apps/mobile_app
        run: flutter build apk --debug
          --dart-define=API_BASE_URL=https://api.alakhservice.com/api/v1
          --dart-define=WS_BASE_URL=https://api.alakhservice.com

      - uses: actions/upload-artifact@v4
        with:
          name: mobile-debug-apk
          path: apps/mobile_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-web:
    name: Build Web Apps
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: stable
          cache: true

      - name: Activate Melos
        run: dart pub global activate melos

      - name: Bootstrap packages
        run: melos bootstrap

      - name: Build shop_web
        working-directory: apps/shop_web
        run: flutter build web
          --dart-define=API_BASE_URL=https://api.alakhservice.com/api/v1
          --dart-define=WS_BASE_URL=https://api.alakhservice.com

      - name: Build admin_web
        working-directory: apps/admin_web
        run: flutter build web
          --dart-define=API_BASE_URL=https://api.alakhservice.com/api/v1
          --dart-define=WS_BASE_URL=https://api.alakhservice.com
