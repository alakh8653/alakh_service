version: 2
updates:
  # Dart/Flutter pub packages
  - package-ecosystem: pub
    directory: /apps/mobile_app
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - mobile
    reviewers:
      - alakh8653
    commit-message:
      prefix: "chore(deps)"
      include: scope

