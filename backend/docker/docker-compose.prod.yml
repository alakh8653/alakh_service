version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runner
    image: alakh-service-api:latest
    container_name: alakh_api_prod
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ['CMD', 'node', '-e', "try { require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1)); } catch(e) { process.exit(1); }"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - alakh_prod_network
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '10'

  postgres:
    image: postgres:16-alpine
    container_name: alakh_postgres_prod
    restart: always
    expose:
      - '5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-alakh_service}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alakh_prod_network
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: alakh_redis_prod
    restart: always
    expose:
      - '6379'
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alakh_prod_network

  nginx:
    image: nginx:alpine
    container_name: alakh_nginx_prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - alakh_prod_network

volumes:
  postgres_prod_data:
  redis_prod_data:
  api_logs:
  nginx_certs:
  nginx_logs:

networks:
  alakh_prod_network:
    driver: bridge
