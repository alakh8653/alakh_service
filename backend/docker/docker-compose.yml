version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder
    image: alakh-service-api:dev
    container_name: alakh_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/alakh_service?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - ../.env
    volumes:
      - ../src:/app/src
      - ../prisma:/app/prisma
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - alakh_network

  postgres:
    image: postgres:16-alpine
    container_name: alakh_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alakh_service
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alakh_network

  redis:
    image: redis:7-alpine
    container_name: alakh_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alakh_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: alakh_redis_commander
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - alakh_network
    profiles:
      - tools

  mailhog:
    image: mailhog/mailhog:latest
    container_name: alakh_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - alakh_network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  api_logs:

networks:
  alakh_network:
    driver: bridge
