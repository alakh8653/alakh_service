name: alakh_service

packages:
  - apps/*
  - packages/*

scripts:
  clean:
    run: melos exec -- flutter clean
    description: Clean all packages

  get:
    run: melos exec -- flutter pub get
    description: Get dependencies for all packages

  analyze:
    run: melos exec -- flutter analyze
    description: Analyze all packages

  format:
    run: melos exec -- dart format .
    description: Format all packages

  test:
    run: melos exec -- flutter test
    description: Run tests in all packages

  build:runner:
    run: melos exec --depends-on="build_runner" -- dart run build_runner build --delete-conflicting-outputs
    description: Run build_runner for all packages with that dependency

  gen:l10n:
    run: melos exec --depends-on="flutter_localizations" -- flutter gen-l10n
    description: Generate l10n for all packages that use flutter_localizations
